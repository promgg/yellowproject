<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lp_textui</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="prompt" class="lt-prompt">
    <div class="lt-badge" id="ltBadge">
      <svg class="lt-ring" viewBox="0 0 44 44">
        <circle class="lt-ring-track" cx="22" cy="22" r="18"/>
        <circle class="lt-ring-fill" id="ltRingFill" cx="22" cy="22" r="18"/>
      </svg>
      <span class="lt-key" id="ltKey"></span>
    </div>
    <div class="lt-textbox">
      <span class="lt-text" id="ltText"></span>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
