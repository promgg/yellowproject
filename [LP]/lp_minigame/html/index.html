<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lp_minigame</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="hidden">
    <div class="lmg-dots" id="dots"></div>

    <div class="lmg-body hidden" id="body-spacebar">
      <div class="lmg-track">
        <div class="lmg-fill" id="sb-fill"></div>
        <div class="lmg-zone" id="sb-zone"></div>
      </div>
      <div class="lmg-hint">กด <span class="lmg-accent">SPACEBAR</span></div>
    </div>

    <div class="lmg-body hidden" id="body-sequence">
      <div class="lmg-keys" id="seq-keys"></div>
      <div class="lmg-seqbar"><div class="lmg-seqbar-fill" id="seq-fill"></div></div>
      <div class="lmg-hint">กด <span class="lmg-accent">W A S D</span> ตามลำดับที่ขึ้นให้ทันเวลา</div>
    </div>

    <div class="lmg-body hidden" id="body-fishing">
      <div class="lmg-fish-wrap">
        <div class="lmg-fish-track" id="fish-track">
          <div class="lmg-fish-zone" id="fish-zone"></div>
          <div class="lmg-fish-indicator" id="fish-indicator"></div>
        </div>
        <div class="lmg-fish-badge">
          <svg class="lmg-fish-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="3.5" r="1.4" fill="currentColor" stroke="none"/>
            <path d="M8 5v9a4 4 0 0 0 8 0v-1.5"/>
          </svg>
        </div>
      </div>
      <div class="lmg-hint">กด <span class="lmg-accent">SPACEBAR</span> ให้ตรงจังหวะ ตอนแท่งขาวอยู่ในโซนทอง</div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
