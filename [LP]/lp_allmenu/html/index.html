<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>AllMenu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="root" class="hidden">

    <!-- Background -->
    <img id="bg" src="assets/8f23faf30c6bc691ad76c4384181bfeee19a763b.png" alt="" />

    <!-- Rotated panel overlay -->
    <div id="panel-overlay">
      <img src="assets/bb96bee9c6332558bcc13654f3b95ded42678a13.png" alt="" />
    </div>

    <!-- ALLMENU label -->
    <div id="lbl-allmenu">ALLMENU</div>

    <!-- Player name section (top right) -->
    <div id="player-section">
      <div id="player-text">
        <div id="player-name">NAME LASTNAME</div>
        <div id="player-id">ID : 123</div>
      </div>
      <div id="player-avatar">
        <img id="player-avatar-img" src="assets/0cc3d37d00d3ea655e9e72b382af323df2875a5f.png" alt="" />
      </div>
    </div>

    <!-- Header slider -->
    <div id="header-image">
      <div id="slider-track">
        <div class="slide"><img src="assets/2f90f681ae977f2e3a26a17b7da205b63be7dd05.png" alt="" /></div>
      </div>
      <button id="slide-prev">&#8249;</button>
      <button id="slide-next">&#8250;</button>
      <div id="slide-dots"></div>
    </div>

    <!-- Header deco line + dot -->
    <div id="deco-line-h"></div>
    <div id="deco-dot-h"></div>

    <!-- Player menu title -->
    <div id="lbl-player-menu">เมนูผู้เล่น</div>

    <!-- Main content area (cards rendered dynamically by script.js) -->
    <div id="content-area">
      <div id="card-big-slot"></div>
      <div id="right-grid"></div>
    </div>

    <!-- Close button hint -->
    <div id="close-hint">กด ESC เพื่อปิด</div>

  </div>

  <div id="preview-overlay"></div>

  <script src="js/script.js"></script>
</body>
</html>
