<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="preview-overlay"></div>

<div id="root" class="hidden">

  <div id="panel">
    <img id="panel-bg" src="assets/panel-bg.png" alt="">

    <div id="title-th">ล็อคอินรายวัน</div>
    <div id="title-en">DAILY LOGIN</div>
    <div id="title-line"></div>
    <div id="title-dot"></div>

    <div id="close-btn">✕</div>

    <!-- Row 1: daily login — FREE track -->
    <div id="free-tag"></div>
    <div id="daily-section">
      <div id="daily-cards"></div>
    </div>
    <div id="scroll-track-top" class="scroll-track"><div class="scroll-thumb"></div></div>

    <!-- Row 2: daily login — VIP track -->
    <div id="vip-tag"></div>
    <div id="reward-section">
      <div id="reward-cards"></div>
    </div>
    <div id="scroll-track-bot" class="scroll-track"><div class="scroll-thumb"></div></div>
  </div>

  <!-- Online-time reward score bar (auto, display only) -->
  <div id="score-bar">
    <div id="score-line"><div id="score-line-fill"></div></div>
    <div id="score-slots"></div>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
