<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="preview-overlay"></div>

<div id="root" class="hidden">

  <div id="panel">
    <img id="panel-bg" src="assets/panel-bg.png" alt="">

    <div id="title-th">ล็อคอินรายวัน</div>
    <div id="title-en">DAILY LOGIN</div>
    <div id="title-line"></div>
    <div id="title-dot"></div>
    <div id="day-counter"></div>

    <div id="close-btn">✕</div>

    <!-- Free/VIP switch instead of two stacked scroll rows -->
    <div id="tab-bar">
      <button class="tab-btn active" id="tab-free" data-track="free">FREE</button>
      <button class="tab-btn" id="tab-vip" data-track="vip">VIP</button>
    </div>

    <div id="daily-grid" class="card-grid active"></div>
    <div id="vip-grid" class="card-grid"></div>

    <!-- overlay แยกจาก #vip-grid ตั้งใจ (ไม่ใช่ลูก) เพราะ buildCards() เคลียร์ innerHTML
         ของ grid ทุกครั้งที่ render ใหม่ ถ้าใส่ไว้ข้างในจะโดนลบทิ้งไปด้วย -->
    <div id="vip-lock-watermark" class="hidden">
      <div id="vip-lock-icon">🔒</div>
      <div id="vip-lock-text">ต้องเป็นสมาชิก VIP<br>จึงจะรับรางวัลแถวนี้ได้</div>
    </div>
  </div>

  <!-- Online-time reward score bar (auto, display only) -->
  <div id="score-bar">
    <div id="score-line"><div id="score-line-fill"></div></div>
    <div id="score-slots"></div>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
