<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>event_notify</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- root starts hidden; revealed by a 'show' message (or the browser mock) -->
  <div id="root" class="hidden">
    <div id="row" class="notify-row"></div>
  </div>

  <!-- preview overlay lives OUTSIDE #root so it is unaffected by root.hidden -->
  <div id="preview-overlay"></div>

  <script src="js/app.js"></script>
</body>
</html>
