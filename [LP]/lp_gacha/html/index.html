<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Gacha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== BROADCAST BANNER (อยู่นอก #root — โชว์ได้แม้ปิดหน้ากาชา) ===== -->
  <div id="broadcast" class="hidden">
    <span class="broadcast-deco left"></span>
    <div id="broadcast-inner">
      <div id="broadcast-title">CONGRATULATIONS</div>
      <div id="broadcast-text"><!-- injected --></div>
    </div>
    <span class="broadcast-deco right"></span>
  </div>

  <div id="root" class="hidden">

    <!-- ===== STAGE: กล่องกาชา (ซ้าย) + ผลลัพธ์ (ขวา สไลด์ออก) ===== -->
    <div id="stage">

      <!-- ---------- LEFT: BOX PANEL ---------- -->
      <section id="box-panel">
        <div id="box-sub">MADE IN THAILAND</div>
        <h1 id="box-title">กาชาสนับสนุน</h1>

        <div id="box-body">
          <!-- การ์ดกล่อง (สั่นตอนเปิด) -->
          <div id="box-card">
            <div id="box-card-glow"></div>
            <div id="box-card-sub">GACHA BOX</div>
            <div id="box-card-name">TOP SECRET</div>
          </div>

          <div id="box-count">GACHA : <span id="box-count-val">0</span></div>

          <!-- แถบเปิด (ซ่อนไว้จนกดเปิด) -->
          <div id="opening" class="hidden">
            <div id="opening-label">OPENING .. <span id="opening-pct">0</span>%</div>
            <div id="opening-bar"><div id="opening-fill"></div></div>
          </div>
        </div>

        <!-- ปุ่มดูอัตราดรอป -->
        <button id="odds-btn" type="button" aria-expanded="false">
          <span class="odds-dot"></span><span>มีโอกาสได้รับ</span>
        </button>
      </section>

      <!-- ---------- RIGHT: RESULT PANEL (slide-out) ---------- -->
      <section id="result-panel" class="hidden" aria-hidden="true">
        <div id="result-head">ITEM RECEIVED</div>
        <div id="result-grid"><!-- cards injected --></div>
      </section>
    </div>

    <!-- ===== ODDS LIST (popover) ===== -->
    <div id="odds-list" class="hidden">
      <div id="odds-list-head">ITEMS LIST</div>
      <div id="odds-list-body"><!-- rows injected --></div>
    </div>

    <!-- ===== BOTTOM ACTION BAR ===== -->
    <div id="action-bar">
      <div id="amount-wrap">
        <span id="amount-label">INPUT AMOUNT</span>
        <input id="amount-input" type="number" min="1" step="1" inputmode="numeric" value="1" />
      </div>
      <button id="random-btn" type="button"><span id="random-btn-label">RANDOM</span></button>
      <span id="amount-msg" class="hidden">ตั๋วไม่พอ</span>
    </div>

    <!-- ปุ่มปิด -->
    <button id="close-btn" type="button" aria-label="ปิด">✕</button>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
