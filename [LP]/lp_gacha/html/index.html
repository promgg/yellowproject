<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Gacha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- broadcast อยู่นอก #root — โชว์ได้แม้ปิดหน้ากาชา -->
  <div id="broadcast" class="hidden">
    <span class="bc-deco"></span>
    <div id="bc-inner"><div id="bc-title">CONGRATULATIONS</div><div id="bc-text"></div></div>
    <span class="bc-deco"></span>
  </div>

  <div id="root" class="hidden">
    <div id="panel">
      <span class="cbrk tl"></span><span class="cbrk tr"></span><span class="cbrk bl"></span><span class="cbrk br"></span>
      <div id="spot"></div>
      <button id="close-btn" aria-label="ปิด">✕</button>

      <!-- LEFT -->
      <section id="left">
        <div id="ttl-row"><span class="fl">✦</span><span id="ttl">GACHAPON</span><span class="fl">✦</span></div>
        <div id="box"><div id="box-glow"></div><img id="box-img" alt="" onerror="this.style.display='none'"></div>
        <div id="box-name">TOP SECRET</div>
        <div id="legend">
          <span><i style="background:#c08a3e"></i>ธรรมดา</span><span><i style="background:#cfcfcf"></i>ทั่วไป</span><span><i style="background:#6fce97"></i>พิเศษ</span>
          <span><i style="background:#4aa3f0"></i>หายาก</span><span><i style="background:#d879ef"></i>เอปิก</span><span><i style="background:#f2c73d"></i>ตำนาน</span>
        </div>
        <div id="cnt">GACHA : <b id="cnt-val">0</b></div>
        <button id="info-btn" aria-expanded="false"><i>ℹ</i> โอกาสได้รับ</button>
        <div id="opening">
          <div id="open-lb">OPENING <span id="pct">0</span>%</div>
          <div id="open-bar"><div id="open-fill"></div></div>
        </div>
      </section>

      <!-- RIGHT -->
      <section id="right">
        <div id="rh">ITEM RECEIVED</div>
        <div id="grid"><div class="empty">— กด RANDOM เพื่อเปิดกล่อง —</div></div>
        <div id="summary"></div>
        <div id="bar">
          <button class="minmax" id="btn-min">MIN</button>
          <div id="amt-wrap"><span class="amt-lb">Amount</span><input id="amt" type="number" min="1" step="1" inputmode="numeric" value="1"></div>
          <button class="minmax" id="btn-max">MAX</button>
          <button id="random-btn">RANDOM</button>
          <span id="msg" class="hidden">ตั๋วไม่พอ</span>
        </div>
      </section>

      <!-- DROPLIST -->
      <div id="droplist" class="hidden"><div id="dl-head">ITEMS LIST · โอกาสได้รับ</div><div id="dl-body"></div></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
