<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ-Cooldown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="cooldownPanel" class="cooldown-badge" aria-hidden="true">
        <div class="timer-ring" aria-hidden="true">
            <svg viewBox="0 0 48 48">
                <circle class="ring-track" cx="24" cy="24" r="20"></circle>
                <circle id="progressRing" class="ring-value" cx="24" cy="24" r="20"></circle>
            </svg>
            <span class="medical-mark">✚</span>
        </div>

        <div class="badge-copy">
            <small>INJURED</small>
            <strong>พักฟื้นอีก</strong>
        </div>

        <time id="cooldown" datetime="PT0M0S">00:00</time>
    </section>

    <script src="script.js"></script>
</body>
</html>
