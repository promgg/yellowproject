<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MJ Welfare Login</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app" class="hidden">
        <div class="bg-vignette"></div>
        <div class="welfare-panel">
            <div class="panel-corners">
                <span class="corner corner-tl"></span>
                <span class="corner corner-tr"></span>
                <span class="corner corner-bl"></span>
                <span class="corner corner-br"></span>
            </div>

            <div class="panel-header">
                <div class="minutes-chip" id="minutesChip">0 นาที</div>
                <div class="title-wrap">
                    <div class="era-mark">Frontier Welfare Office</div>
                    <div class="title-ornament"><span></span><i>✦</i><span></span></div>
                    <div class="title" id="titleText">ออนไลน์สะสมรับสวัสดิการ</div>
                    <div class="subtitle" id="subtitleText">มารับของรายชั่วโมงและสวัสดิการเข้าเมือง</div>
                </div>
                <button id="closeBtn" class="close-btn" type="button">×</button>
            </div>

            <div class="progress-shell">
                <div class="progress-line">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-nodes" id="progressNodes"></div>
            </div>

            <div class="reward-strip" id="rewardStrip"></div>

            <div class="bottom-section">
                <div class="status-block">
                    <div class="status-line">
                        ออนไลน์มาแล้ว <span id="onlineMinutes">0</span> นาที
                    </div>
                    <div class="status-subline" id="nextRewardText">โปรดรออีก 0 นาที เพื่อรับของชิ้นต่อไป</div>
                    <div class="status-note">เดินทางมารับที่จุด หรือเปิดรับอัตโนมัติไว้ได้ตลอดเวลา</div>
                </div>

                <label class="toggle-row">
                    <input id="autoClaimToggle" type="checkbox" />
                    <span class="toggle-ui">
                        <span class="toggle-thumb"></span>
                    </span>
                    <span class="toggle-label">รับรางวัลอัตโนมัติ</span>
                </label>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
