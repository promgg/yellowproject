<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Respwan</title>
    <link href="css/style.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <!-- แผงหน้าจอตาย: กลุ่มลอยกลางล่างจอ (Prompt Cluster) ธีมมืด-ทอง สไตล์ lp_textui -->
    <div id="deathScreen" class="lt-death">

        <!-- ID ผู้เล่น มุมขวาล่าง -->
        <div class="lt-pid">ID: <span id="PlayerId">0</span></div>

        <div class="lt-cluster">
            <!-- ตัวนับถอยหลัง -->
            <div class="lt-timer">
                <span class="lt-eyebrow">RESPAWN IN</span>
                <span class="lt-digits" id="timer">05:00</span>
                <span class="lt-subtitle">คุณเสียชีวิต · รอการเกิดใหม่</span>
            </div>

            <!-- แถวปุ่ม (กดค้าง = fill ไล่จากซ้าย) -->
            <div class="lt-row" id="btnRow">
                <div class="lt-btn is-hide" id="btn-clearBody">
                    <span class="lt-fill"></span>
                    <span class="lt-keycap">G</span>
                    <span class="lt-lbl"><span class="en">CLEAR BODY</span><span class="th">ซิงค์ร่างกาย</span></span>
                </div>

                <div class="lt-btn is-dim" id="btn-respawn">
                    <span class="lt-fill"></span>
                    <span class="lt-keycap">E</span>
                    <span class="lt-lbl"><span class="en">RESPAWN</span><span class="th">เกิดที่โรงพยาบาล</span></span>
                </div>

                <div class="lt-btn is-hide" id="btn-leaveActivity">
                    <span class="lt-fill"></span>
                    <span class="lt-keycap">X</span>
                    <span class="lt-lbl"><span class="en">LEAVE ACTIVITY</span><span class="th">ออกจากกิจกรรม</span></span>
                </div>

                <div class="lt-btn is-hide" id="btn-callHelp">
                    <span class="lt-fill"></span>
                    <span class="lt-keycap">H</span>
                    <span class="lt-lbl"><span class="en">CALL FOR HELP</span><span class="th">ขอความช่วยเหลือ</span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js" type="text/javascript"></script>
</body>

</html>
