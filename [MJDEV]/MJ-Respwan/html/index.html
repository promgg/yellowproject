<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Respwan</title>
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link href="css/style.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <!-- แผงหน้าจอตาย: ยึดด้านล่างจอ ขอบแดง ธีมมืด-ทอง -->
    <div id="deathScreen" class="death-screen">
        <div class="death-panel">

            <!-- ส่วนกลาง: RESPAWN IN + นับถอยหลัง MM:SS + ข้อความ -->
            <div class="death-center">
                <div class="respawn-label">RESPAWN IN</div>
                <div class="respawn-timer" id="timer">05:00</div>
                <div class="death-subtitle">คุณเสียชีวิต กรุณารอการเกิดใหม่</div>
            </div>

            <div class="death-id">ID: <span id="PlayerId">0</span></div>

            <!-- แถวปุ่ม 5 ปุ่ม (hotkey ต่อปุ่ม) -->
            <div class="death-buttons">
                <div class="death-btn" id="btn-clearBody">
                    <span class="key">G</span>
                    <span class="labels">
                        <span class="label-main">CLEAR BODY</span>
                        <span class="label-sub">ซิงค์ร่างกาย</span>
                    </span>
                </div>

                <div class="death-btn disabled" id="btn-respawn">
                    <span class="key">E</span>
                    <span class="labels">
                        <span class="label-main">RESPAWN</span>
                        <span class="label-sub">เกิดที่โรงพยาบาล</span>
                    </span>
                </div>

                <div class="death-btn hidden" id="btn-leaveActivity">
                    <span class="key">X</span>
                    <span class="labels">
                        <span class="label-main">LEAVE ACTIVITY</span>
                        <span class="label-sub">ออกจากกิจกรรม</span>
                    </span>
                </div>

                <div class="death-btn" id="btn-callHelp">
                    <span class="key">H</span>
                    <span class="labels">
                        <span class="label-main">CALL FOR HELP</span>
                        <span class="label-sub">ขอความช่วยเหลือ</span>
                    </span>
                </div>
            </div>

        </div>
    </div>

    <script src="js/script.js" type="text/javascript"></script>
</body>

</html>
