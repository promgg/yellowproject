<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>MJ AutoHorse</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="root" class="hidden">
    <div id="badge-delcar" class="badge hidden">
      <img class="badge-img" src="img/badge_full.png" alt="" />
      <div class="countdown"><span class="txtMin">00</span>:<span class="txtSec">59</span></div>
    </div>

    <div id="badge-restart" class="badge hidden">
      <img class="badge-img" src="img/watch_restart.png" alt="" />
      <div class="countdown"><span class="txtMin">00</span>:<span class="txtSec">59</span></div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script src="js/app.js"></script>
</body>
</html>
