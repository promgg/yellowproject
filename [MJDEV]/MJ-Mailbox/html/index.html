<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Mailbox System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <button id="closeButton">❌</button>

        <div class="header">
            <img src="./img/mail_box.png" alt="จดหมาย">
            <h2>📥 จดหมาย</h2>
        </div>
        <div class="sidebar">
            <button onclick="showSection('inbox')">📥 กล่องข้อความ</button>
            <button onclick="showSection('contacts')">👥 รายชื่อผู้ติดต่อ</button>
            <button onclick="showSection('send')">▶️ จดหมายที่ส่ง</button>
            <div class="bottom" id="userInfo">
                กำลังโหลดข้อมูลผู้ใช้...
            </div>
        </div>
        <div class="main">
            <div id="inboxContainer">
                <h3>📥 กล่องจดหมาย</h3>
                <div id="inbox" class="section active">
                    <div class="message">
                    </div>
                </div>
            </div>
            <div id="contacts" class="section">
                <div class="search-box" style="display: flex; align-items: center; gap: 10px;">
                    <input type="text" id="searchInput" placeholder="ค้นหารายชื่อผู้ติดต่อ..."
                        style="flex: 1; height: 36px; padding: 6px 10px;">
                    <button id="openAddContactBtn">+ เพิ่มเพื่อน</button>
                </div>
                <div id="contactList" class="contact-list" style="margin-top: 15px;"></div>
            </div>
            <div id="send" class="section">
                <div class="form">
                    <input type="text" id="recipientId" placeholder="ใส่ ID ผู้รับ">
                    <input type="text" id="recipientName" placeholder="ชื่อผู้รับ">
                    <input type="text" id="mailSubject" placeholder="หัวข้อจดหมาย">
                    <textarea id="mailMessage" placeholder="พิมพ์ข้อความ..." rows="6"></textarea>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" placeholder="URL รูป (ไม่บังคับ)">
                        <input type="text" placeholder="พิกัด (ไม่บังคับ)" />
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button onclick="getLocation()">📍พิกัดฉัน</button>
                        <button onclick="openItemSelector()">🎒 แนบไอเท็ม</button>
                        <span id="selectedItem" style="color: white;"></span>
                        <button id="sendBtn">📤 ส่งข้อความ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="itemPopup" class="popup" style="display: none;">
        <h3 style="color: yellow;">เลือกไอเท็มที่จะแนบ</h3>
        <div id="itemList" class="form" style="max-height: 200px; overflow-y: auto;"></div>
        <div class="actions">
            <button onclick="closeItemPopup()">ยกเลิก</button>
        </div>
    </div>

    <div id="popup" class="popup">
        <h3 style="color: yellow;">เขียนข้อความ</h3>
        <p style="color: white;">ส่งข้อความถึง: <span id="recipientName">Dev</span></p>
        <textarea placeholder="พิมพ์ข้อความที่นี่..." rows="5"></textarea>
        <div class="form">
            <input type="text" placeholder="URL รูป (ไม่บังคับ)">
            <input type="text" placeholder="พิกัด (ไม่บังคับ)" />
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="getLocation()">📍พิกัดฉัน</button>
            <button onclick="openItemSelector()">🎒 แนบไอเท็ม</button>
            <span id="selectedItem" style="color: white;"></span>
        </div>
        <div class="actions">
            <button onclick="closePopup()">ยกเลิก</button>
            <button id="sendBtn">📤 ส่งข้อความ</button>
        </div>
    </div>

    <div id="addContactPopup" class="popup">
        <h3 style="color: yellow;">เพิ่มรายชื่อผู้ติดต่อ</h3>
        <div class="form">
            <input type="text" id="contactName" placeholder="ชื่อผู้ติดต่อ">
            <input type="text" id="contactId" placeholder="ระบุ ID ผู้ติดต่อ">
        </div>
        <div class="actions">
            <button onclick="closeAddContactPopup()">ยกเลิก</button>
            <button id="btnAddContact" style="background-color: green;">✅ เพิ่มรายชื่อ</button>
        </div>
    </div>

    <!-- mail icon ด้านล่างขวา -->
    <div id="mailIconWrapper" style="display:none; position:fixed; bottom:20px; right:20px;">
        <img id="mailIcon" src="/html/img/mail_icon.png" style="width:40px;">
        <span id="mailCountBadge">3</span> <!-- จำนวนจดหมาย -->
    </div>
    
    <!-- Include jQuery and SweetAlert -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/script.js" type="text/javascript"></script>
</body>

</html>
