<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap" rel="stylesheet">
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <link rel="stylesheet" href="https://proicons.netlify.app/css/icons.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div class="background-inner"></div>
        <div class="background">
            <div class="header-main">MJ DEV สามารถสั่งซื้อสัตว์เลี้ยงได้ที่นี้</div>
            <div class="leftbox">
                <div class="body">
                    <div class="header"></div>
                    <div class="body-text">
                        <p><i class="fa-solid fa-bone" style="color: #ffffffd7;"></i> กำลังเลี้ยง</p>
                        <p><i class="fa-solid fa-carrot" style="color: #9cad01;"></i> โปรดให้อาหาร</p>
                        <p><i class="fa-solid fa-heart" style="color: #f2002d;"></i> พร้อมเก็บ</p>
                    </div>
                </div>
            </div>
            <div class="centerbox">
                <div class="section">
                    <div class="animalcount"><span id="animalcount">0</span>/5</div>
                    <div class="animalline"></div>
                    <div class="animalprice"><span id="price">2,000</span></div>
                </div>
                <div class="body">
                    <div class="AnimalBox">
                        <div class="header" data-animalstatus="1">
                            <i class="fa-solid fa-bone"></i>
                        </div>
                        <div class="animal" data-animalicon="1">
                            <i class="fa-solid fa-plus" style="font-size: 50px; color: green; cursor: pointer;"
                                onclick="BuyAnimal(1)">
                            </i>
                        </div>
                        <div class="footer">
                            <div class="loadbar">
                                <div data-animalload="1" class="loadbar2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="AnimalBox">
                        <div class="header" data-animalstatus="2">
                            <i class="fa-solid fa-bone"></i>
                        </div>
                        <div class="animal" data-animalicon="2">
                            <i class="fa-solid fa-plus" style="font-size: 50px; color: green; cursor: pointer;"
                                onclick="BuyAnimal(2)">
                            </i>
                        </div>
                        <div class="footer">
                            <div class="loadbar">
                                <div data-animalload="2" class="loadbar2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="AnimalBox">
                        <div class="header" data-animalstatus="3">
                            <i class="fa-solid fa-bone"></i>
                        </div>
                        <div class="animal" data-animalicon="3">
                            <i class="fa-solid fa-plus" style="font-size: 50px; color: green; cursor: pointer;"
                                onclick="BuyAnimal(3)">
                            </i>
                        </div>
                        <div class="footer">
                            <div class="loadbar">
                                <div data-animalload="3" class="loadbar2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="AnimalBox">
                        <div class="header" data-animalstatus="4">
                            <i class="fa-solid fa-bone"></i>
                        </div>
                        <div class="animal" data-animalicon="4">
                            <i class="fa-solid fa-plus" style="font-size: 50px; color: green; cursor: pointer;"
                                onclick="BuyAnimal(4)">
                            </i>
                        </div>
                        <div class="footer">
                            <div class="loadbar">
                                <div data-animalload="4" class="loadbar2"></div>
                            </div>
                        </div>
                    </div>
                    <div class="AnimalBox">
                        <div class="header" data-animalstatus="5">
                            <i class="fa-solid fa-bone"></i>
                        </div>
                        <div class="animal" data-animalicon="5">
                            <i class="fa-solid fa-plus" style="font-size: 50px; color: green; cursor: pointer;"
                                onclick="BuyAnimal(5)">
                            </i>
                        </div>
                        <div class="footer">
                            <div class="loadbar">
                                <div data-animalload="5" class="loadbar2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="rightbox">
                <div class="body">
                    <div class="header"></div>
                    <div class="body-text">
                        <img width="64px" height="64px" id="AnimalFeed" src="./img/hungry.png" />
                        <p><i class="fa-solid fa-heart-crack"></i></i>อาหารที่ต้องการ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="pet-alert" class="pet-alert">
        <img id="pet-alert-img" src="./img/hungry.png" alt="Alert">
        <p id="pet-alert-text">สัตว์เลี้ยงของคุณหิวแล้ว!</p>
    </div>
</body>
<script src="./js/script.js" type="text/javascript"></script>

</html>
