<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nx_inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="inventory-root" class="inventory-root is-hidden" aria-live="polite">
        <section class="inventory-shell" aria-label="Inventory">
            <div class="inventory-close-tools" aria-label="Close inventory">
                <span>ESC ปิด</span>
                <button id="inventory-close" type="button" aria-label="ปิดกระเป๋า">×</button>
            </div>
            <aside class="fast-panel" aria-label="Fast slots">
                <div id="fast-slots" class="fast-slots"></div>
            </aside>

            <section class="main-panel" aria-label="Player inventory">
                <header class="inventory-header">
                    <div class="title-block">
                        <h1 id="inventory-title">กระเป๋า</h1>
                        <p>INVENTORY</p>
                    </div>
                    <div class="weight-block">
                        <div class="weight-track">
                            <div id="weight-fill" class="weight-fill"></div>
                        </div>
                        <span id="weight-text">LIMITS 0/0 FULL</span>
                    </div>
                </header>

                <section id="inventory-grid-wrap" class="inventory-grid-wrap">
                    <div class="inventory-tools" aria-label="Inventory filters">
                        <input id="inventory-search" type="search" placeholder="Search..." autocomplete="off">
                        <select id="inventory-sort" aria-label="Sort inventory">
                            <option value="category">Category</option>
                            <option value="name">Name</option>
                            <option value="count">Amount</option>
                        </select>
                    </div>
                    <div id="inventory-category" class="category-pills" role="tablist" aria-label="Item category">
                        <button class="cat-pill is-active" data-cat="all" type="button" role="tab">ทั้งหมด</button>
                        <button class="cat-pill" data-cat="foods" type="button" role="tab">อาหาร</button>
                        <button class="cat-pill" data-cat="weapons" type="button" role="tab">อาวุธ</button>
                        <button class="cat-pill" data-cat="ammo" type="button" role="tab">กระสุน</button>
                        <button class="cat-pill" data-cat="medical" type="button" role="tab">การแพทย์</button>
                        <button class="cat-pill" data-cat="tools" type="button" role="tab">เครื่องมือ</button>
                        <button class="cat-pill" data-cat="valuables" type="button" role="tab">ของมีค่า</button>
                    </div>
                    <div id="inventory-grid" class="inventory-grid"></div>
                    <p id="inventory-empty" class="empty-state">No items</p>
                </section>

                <section id="selected-panel" class="selected-panel is-hidden" aria-label="Selected item actions">
                    <div>
                        <strong id="selected-name"></strong>
                        <span id="selected-meta"></span>
                    </div>
                    <div id="action-strip" class="action-strip"></div>
                </section>

                <footer class="inventory-footer">
                    <img class="footer-divider" src="assets/spacebuttom.png" alt="">
                    <div class="footer-row">
                        <div class="money-display" aria-label="Money">
                            <svg class="money-icon" aria-hidden="true" viewBox="0 0 37 46" fill="none">

                            </svg>
                            <span id="money-value">0</span>
                            <button id="give-money-btn" class="give-money-btn" type="button">มอบเงิน</button>
                        </div>
                        <div id="player-id" class="player-id">ID : 0</div>
                    </div>
                </footer>
            </section>

            <aside id="secondary-panel" class="secondary-panel is-hidden" aria-label="Secondary inventory">
                <header class="secondary-header">
                    <div class="title-block">
                        <h2 id="secondary-title">Storage</h2>
                        <p>INVENTORY</p>
                    </div>
                    <span id="secondary-capacity" class="secondary-capacity"></span>
                </header>

                <section class="secondary-grid-wrap">
                    <div id="secondary-grid" class="secondary-grid"></div>
                    <p id="secondary-empty" class="empty-state">No items</p>
                </section>

                <footer class="secondary-footer" aria-hidden="true">
                    <img class="footer-divider" src="assets/spacebuttom.png" alt="">
                </footer>
            </aside>
        </section>

        <nav id="context-menu" class="context-menu is-hidden" aria-label="Item actions"></nav>
        <aside id="item-tooltip" class="item-tooltip is-hidden" aria-live="polite"></aside>

        <section id="player-modal" class="modal-backdrop is-hidden" aria-label="Nearby players">
            <div class="player-modal">
                <button id="player-modal-close" type="button" class="modal-close" aria-label="Close">X</button>
                <h2 id="player-modal-title">Select player</h2>
                <div id="player-list" class="player-list"></div>
            </div>
        </section>

        <section id="quantity-modal" class="modal-backdrop is-hidden" aria-label="Quantity">
            <form id="quantity-form" class="quantity-modal">
                <button id="quantity-close" type="button" class="modal-close" aria-label="Close">X</button>
                <h2 id="quantity-title">Amount</h2>
                <div class="quantity-stepper">
                    <button id="quantity-min" class="quantity-preset" type="button" aria-label="Set minimum amount">MIN</button>
                    <input id="quantity-input" type="number" min="1" step="1" value="1" inputmode="numeric">
                    <button id="quantity-max" class="quantity-preset" type="button" aria-label="Set maximum amount">MAX</button>
                </div>
                <button type="submit">OK</button>
            </form>
        </section>

        <section id="confirm-modal" class="modal-backdrop is-hidden" aria-label="Confirm action">
            <div class="confirm-modal">
                <button id="confirm-close" type="button" class="modal-close" aria-label="Close">X</button>
                <h2 id="confirm-title">Confirm</h2>
                <p id="confirm-message"></p>
                <div class="confirm-actions">
                    <button id="confirm-cancel" type="button">CANCEL</button>
                    <button id="confirm-accept" type="button" class="is-danger">CONFIRM</button>
                </div>
            </div>
        </section>

        <section id="transaction-loader" class="transaction-loader is-hidden" aria-label="Transaction">
            <div class="loader-mark"></div>
            <span id="transaction-text">Loading</span>
        </section>
    </main>

    <!-- Peek hotbar: แถบ fast-slot ลอยแบบ read-only โผล่ตอนกด Alt ค้าง (อยู่นอก inventory-root
         จึงโชว์ได้ตอนกระเป๋าปิด) เฟดเข้า/ออกด้วย class is-visible ไม่แย่ง focus เกม -->
    <aside id="fast-peek" class="fast-peek" aria-hidden="true">
        <div id="fast-peek-slots" class="fast-slots"></div>
    </aside>

    <script src="js/vendor/jquery-3.3.1.min.js"></script>
    <script src="js/vendor/jquery-ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
