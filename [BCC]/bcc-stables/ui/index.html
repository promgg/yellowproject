<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>bcc-stables</title>
  <link href="css/fa-base.min.css" rel="stylesheet" />
  <link href="css/fa-solid.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <div id="stable-root" class="hidden">
    <!-- ===== TOP BAR ===== -->
    <div id="topbar">
      <button id="btn-back" type="button">‹ ย้อนกลับ</button>
      <div id="topbar-right">
        <span id="top-datetime"></span>
      </div>
    </div>

    <!-- ===== HORSE HEADER (top center) ===== -->
    <div id="horse-header">
      <div id="horse-name">—</div>
      <div id="horse-meta">—</div>
    </div>

    <!-- left: HORSE INFO stats -->
    <div id="stat-panel" class="side-panel">
      <div class="panel-title">HORSE INFO</div>
      <div class="panel-underline"></div>
      <div id="stat-rows"><!-- injected --></div>
    </div>

    <!-- right: current condition (HP/stamina จริงจาก DB — รักษาแล้วขึ้นจริง) + saddlebag -->
    <div id="saddlebag-panel" class="side-panel">
      <div class="cond-title">สภาพม้า</div>
      <div id="cond-rows"><!-- HP/stamina bars injected --></div>
      <div class="sb-divider"></div>
      <div class="sb-title">กระเป๋าอานม้า</div>
      <div class="sb-slots">จำนวน <span id="sb-slot-count">0</span> ช่อง</div>
      <!-- ปุ่มเฉพาะตัวม้านี้ (กระเป๋า/แต่งอาน/ปล่อย) รวมไว้ข้างกัน -->
      <div id="horse-actions">
        <button id="btn-cargo" type="button"><i class="fa-solid fa-box-open"></i> เปิดกระเป๋า</button>
        <button id="btn-tack" type="button"><i class="fa-solid fa-toolbox"></i> แต่งอาน</button>
        <button id="btn-release" class="danger" type="button"><i class="fa-solid fa-xmark"></i> ปล่อยม้า</button>
      </div>

      <!-- ยืนยันก่อนปล่อยม้า -->
      <div id="release-confirm" class="hidden">
        <div class="rc-text">ยืนยันปล่อยม้า <span id="rc-name"></span>?</div>
        <div class="rc-btns">
          <button id="rc-yes" type="button">ปล่อย</button>
          <button id="rc-no" type="button">ยกเลิก</button>
        </div>
      </div>
    </div>

    <!-- horse selector (prev/next through owned horses) — main mode only -->
    <button id="sel-prev" class="sel-arrow" type="button">‹</button>
    <button id="sel-next" class="sel-arrow" type="button">›</button>

    <!-- rotate controls (กดค้างหมุนต่อเนื่อง) -->
    <div id="rotate-controls">
      <button class="rot-btn" data-dir="left" type="button"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="rot-btn" data-dir="right" type="button"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <!-- ===== BOTTOM: context row + horizontal action bar (mode switcher) ===== -->
    <div id="bottom">
      <!-- context row: mode-specific header/controls (shop detail, tack categories + save) -->
      <div id="mode-context" class="hidden"></div>

      <div id="action-bar-wrap">
        <button id="ab-prev" class="ab-scroll" type="button">‹</button>
        <div id="action-bar"><!-- slots injected per mode --></div>
        <button id="ab-next" class="ab-scroll" type="button">›</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
