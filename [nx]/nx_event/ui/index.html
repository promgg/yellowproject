<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nx_event</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ── Event HUD: แถบ nameplate บนกลางจอ ─────────────────────────────── -->
    <div id="event-hud" class="hidden">
        <div class="ev-title">สมบัติแห่งสัญญา</div>
        <div class="group">
            <div class="platesrow" id="cityRow"></div>
            <div class="footrow">
                <span class="chip">
                    <span class="lbl">กล่อง</span>
                    <span class="boxstrip" id="boxStrip"></span>
                    <span id="boxCount">0/5</span>
                </span>
                <span class="chip timer" id="timerChip">
                    <span class="lbl">เหลือเวลา</span>
                    <span id="timer-value">10:00</span>
                </span>
            </div>
        </div>
    </div>

    <!-- ── Downed overlay ────────────────────────────────────────────────── -->
    <div id="downed-overlay" class="hidden">
        <div class="downed-title">☠ คุณถูกทำให้สลบ</div>
        <div class="downed-sub">รอเพื่อนมาช่วยเหลือ หรือรอกิจกรรมสิ้นสุด</div>
    </div>

    <!-- ── Result panel ──────────────────────────────────────────────────── -->
    <div id="result-panel" class="hidden">
        <div class="result-title">⚔ กิจกรรมสิ้นสุดแล้ว</div>
        <div id="result-list"></div>
        <div class="result-note">รางวัลถูกส่งไปยังกระเป๋าของคุณแล้ว</div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
