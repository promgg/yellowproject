<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nx_hud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="nxHudRoot" class="nx-hud-root is-visible" aria-hidden="true">
        <section id="nxMainHud" class="nx-main-hud">
            <div class="nx-player-strip">
                <div class="nx-panel-box nx-id-box">
                    <span id="nxPlayerId">ID: --</span>
                </div>

                <div id="nxMicBox" class="nx-panel-box nx-mic-box">
                    <span class="nx-svg-icon" data-icon="mic"></span>
                </div>

                <div class="nx-panel-box nx-voice-box">
                    <span class="nx-svg-icon nx-speaker-icon" data-icon="speaker"></span>
                    <span id="nxVoiceMode">NORMAL</span>
                </div>
            </div>

            <div class="nx-health-row">
                <div id="nxHeartBox" class="nx-panel-box nx-heart-box">
                    <span class="nx-svg-icon" data-icon="heart"></span>
                </div>

                <div class="nx-health-frame">
                    <div id="nxHealthFill" class="nx-health-fill"></div>
                </div>
            </div>

            <div id="nxSecondaryBar" class="nx-secondary-bar">
                <div id="nxSecondaryFill" class="nx-secondary-fill"></div>
            </div>

            <div id="nxStatusIcons" class="nx-status-icons"></div>

            <aside id="nxHorsePanel" class="nx-horse-panel" aria-hidden="true">
                <div class="nx-horse-divider"></div>

                <div class="nx-horse-row" data-horse-key="health">
                    <div class="nx-horse-icon">
                        <span class="nx-svg-icon" data-icon="heartPulse"></span>
                    </div>
                    <div class="nx-horse-meter">
                        <div id="nxHorseHealthFill" class="nx-horse-fill"></div>
                    </div>
                </div>

                <div class="nx-horse-row" data-horse-key="stamina">
                    <div class="nx-horse-icon">
                        <span class="nx-svg-icon" data-icon="bolt"></span>
                    </div>
                    <div class="nx-horse-meter">
                        <div id="nxHorseStaminaFill" class="nx-horse-fill"></div>
                    </div>
                </div>

                <div class="nx-horse-row" data-horse-key="condition">
                    <div class="nx-horse-icon">
                        <span class="nx-svg-icon" data-icon="saddle"></span>
                    </div>
                    <div class="nx-horse-meter">
                        <div id="nxHorseConditionFill" class="nx-horse-fill"></div>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
