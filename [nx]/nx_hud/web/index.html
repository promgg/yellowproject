<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nx_hud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="nxHudRoot" class="nx-hud-root" aria-hidden="true">
        <section id="nxRadarMap" class="nx-radar-map is-hidden" aria-hidden="true">
            <div id="nxMapViewport" class="nx-radar-viewport">
                <div id="nxMapTiles" class="nx-radar-tiles"></div>
                <div class="nx-radar-tint"></div>
                <div class="nx-radar-vignette"></div>
                <div id="nxMapPlayer" class="nx-radar-player">
                    <svg viewBox="0 0 32 40" aria-hidden="true">
                        <path d="M16 2 L28 34 L16 29 L4 34 Z"></path>
                    </svg>
                </div>
            </div>

            <div class="nx-radar-frame"></div>
            <i class="nx-radar-tick tick-n"></i>
            <i class="nx-radar-tick tick-ne"></i>
            <i class="nx-radar-tick tick-e"></i>
            <i class="nx-radar-tick tick-se"></i>
            <i class="nx-radar-tick tick-s"></i>
            <i class="nx-radar-tick tick-sw"></i>
            <i class="nx-radar-tick tick-w"></i>
            <i class="nx-radar-tick tick-nw"></i>
            <span class="nx-cardinal cardinal-n">N</span>
            <span class="nx-cardinal cardinal-e">E</span>
            <span class="nx-cardinal cardinal-s">S</span>
            <span class="nx-cardinal cardinal-w">W</span>
            <div id="nxRadarDebug" class="nx-radar-debug"></div>
        </section>

        <section id="nxMainHud" class="nx-main-hud">
            <div class="nx-player-strip">
                <div class="nx-panel-box nx-id-box">
                    <span id="nxPlayerId">ID: --</span>
                </div>

                <div id="nxMicBox" class="nx-panel-box nx-mic-box">
                    <span class="nx-svg-icon" data-icon="mic"></span>
                </div>

                <div class="nx-panel-box nx-voice-box">
                    <span class="nx-svg-icon nx-speaker-icon" data-icon="speaker"></span>
                    <span id="nxVoiceMode">NORMAL</span>
                </div>
            </div>

            <div class="nx-health-row">
                <div id="nxHeartBox" class="nx-panel-box nx-heart-box">
                    <span class="nx-svg-icon" data-icon="heart"></span>
                </div>
                <div class="nx-health-frame">
                    <div id="nxHealthFill" class="nx-health-fill"></div>
                </div>
            </div>

            <div id="nxSecondaryBar" class="nx-secondary-bar">
                <div id="nxSecondaryFill" class="nx-secondary-fill"></div>
            </div>

            <!-- วงกลมสถานะทั้งหมดอยู่ในแถวเดียวกันหมด: food / water / core / mic / ม้า 3 วง
                 วงม้าถูกสร้างจาก app.js (EXTRA_STATUS_ICONS) และซ่อนไว้จนกว่าจะขี่ม้า
                 แผงม้าแบบแถบนอน (nx-horse-panel) เดิมถูกถอดออกแล้ว -->
            <div id="nxStatusIcons" class="nx-status-icons"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
