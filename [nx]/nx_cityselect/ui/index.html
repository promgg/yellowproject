<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nx_cityselect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════
     CITY SELECTION OVERLAY
═══════════════════════════════════════════════ -->
<div id="app" class="hidden">

    <!-- Parchment background frame -->
    <div class="parchment-overlay">

        <!-- Corner ornaments -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Header -->
        <div class="header">
            <div class="header-ornament">✦ ────────── ✦ ────────── ✦</div>
            <h1 class="title" id="ui-title">เลือกเมืองของท่าน</h1>
            <p  class="subtitle" id="ui-subtitle">เมืองที่คุณเลือกจะเป็นบ้านเกิดของคุณตลอดไป</p>
            <div class="header-ornament">✦ ────────── ✦ ────────── ✦</div>
        </div>

        <!-- City cards container -->
        <div class="cities-row" id="cities-row">
            <!-- Injected by JS -->
        </div>

        <!-- Footer brand -->
        <div class="footer-brand">
            ═══ ★ &nbsp; FRONTIER REPUBLIC &nbsp; ★ ═══
        </div>
    </div>

</div>

<!-- ═══════════════════════════════════════════════
     TERRITORY HUD INDICATOR (always visible when in zone)
═══════════════════════════════════════════════ -->
<div id="territory-hud" class="territory-hud hidden">
    <div class="territory-inner">
        <div class="territory-pip" id="territory-pip"></div>
        <span class="territory-name" id="territory-name"></span>
    </div>
</div>

<!-- ═══════════════════════════════════════════════
     CONFIRM MODAL
═══════════════════════════════════════════════ -->
<div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">ยืนยันการเลือก</div>
        <div class="modal-divider">── ✦ ──</div>
        <p class="modal-msg" id="modal-msg"></p>
        <div class="modal-actions">
            <button class="btn btn-confirm" id="btn-confirm">ยืนยัน</button>
            <button class="btn btn-cancel"  id="btn-cancel">ยกเลิก</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
